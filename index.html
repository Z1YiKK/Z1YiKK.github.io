<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1奇妙小工具</title>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            background-image: url('./images/1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            z-index: 3;
            position: relative;
            margin: 1.5rem 0;
        }

        .glass-panel {
            background: rgba(20, 20, 30, 0.35);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 2.8rem;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 30px 50px -12px rgba(0, 0, 0, 0.35), 
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            transition: box-shadow 0.3s ease;
            pointer-events: auto;
        }

        .glass-panel:hover {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.45), 
                        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        h1 {
            font-weight: 450;
            font-size: 2.6rem;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 1rem;
        }

        h1 i {
            font-size: 2.2rem;
            opacity: 0.9;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        h2 {
            font-weight: 380;
            font-size: 1.6rem;
            margin-bottom: 1.3rem;
            letter-spacing: -0.01em;
        }

        /* 天气主区域 —— 减小下边距 */
        .weather-section {
            margin-bottom: 1.8rem;   /* 原为 2.8rem，大幅压缩 */
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 2.2rem;
            max-width: 480px;
        }

        .search-wrapper input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 60px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.25s;
            font-weight: 300;
        }

        .search-wrapper input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-wrapper input:focus {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .search-wrapper button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 60px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #1a1f2c;
            border: 1px solid rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .search-wrapper button:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.15);
        }

        /* 关键：让右侧与顶部对齐 */
        .weather-row {
            display: flex;
            align-items: flex-start;   /* 改为顶部对齐 */
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 25px;
        }

        .weather-left {
            flex: 2;
            min-width: 280px;
        }

        .weather-right {
            flex: 1.2;
            min-width: 260px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .temp-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .temp-value {
            font-size: 5.8rem;
            font-weight: 200;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .temp-unit {
            font-size: 2.2rem;
            font-weight: 200;
            opacity: 0.8;
        }

        .city-status {
            font-size: 1.8rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .weather-icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
        }

        .weather-desc {
            text-transform: capitalize;
            font-size: 1.3rem;
            font-weight: 300;
            opacity: 0.9;
            margin-top: 5px;
        }

        .detail-grid {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .detail-chip {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 300;
            font-size: 1.1rem;
        }

        .fun-message {
            margin-top: 20px;
            font-weight: 300;
            background: rgba(255,255,240,0.1);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border-left: 4px solid #ffe082;
        }

        /* 右侧组合卡片 */
        .info-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 1.8rem 1.8rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .clock-section {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
        }

        .clock-time {
            font-size: 4.5rem;
            font-weight: 250;
            line-height: 1.2;
            letter-spacing: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .clock-date {
            font-size: 1.3rem;
            opacity: 0.8;
            margin-top: 8px;
            font-weight: 300;
        }

        .mood-section {
            padding-top: 1.5rem;
            text-align: center;
        }

        .mood-emoji {
            font-size: 4rem;
            line-height: 1.2;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .mood-desc {
            font-size: 1.4rem;
            font-weight: 300;
            margin: 10px 0 5px;
        }

        .mood-temp-tip {
            font-size: 1rem;
            opacity: 0.75;
            font-style: italic;
        }

        /* 下载区域 —— 减小上边距 */
        .download-section {
            margin: 1.5rem 0 2.5rem;   /* 上边距从 2.5rem 减到 1.5rem */
            display: flex;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .download-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(8px);
            padding: 1.2rem 3rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 450;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 25px -6px rgba(0,0,0,0.25);
        }

        .download-btn i {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .download-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 24px 35px -10px rgba(0,0,0,0.35);
        }

        .download-subtitle {
            margin-top: 8px;
            font-size: 0.95rem;
            opacity: 0.8;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 软件链接区域 */
        .software-section {
            margin-top: 0.5rem;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .soft-link {
            background: rgba(20, 25, 35, 0.35);
            backdrop-filter: blur(8px);
            padding: 1.2rem 0.3rem;
            border-radius: 28px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: 400;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .soft-link i {
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }

        .soft-link:hover {
            background: rgba(70, 80, 100, 0.5);
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 18px 28px -10px rgba(0,0,0,0.4);
        }

        .soft-link:hover i {
            transform: scale(1.12);
        }

        .footer-meta {
            margin-top: 2rem;
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.7;
            font-weight: 300;
            display: flex;
            justify-content: flex-end;
        }

        .zyk-badge {
            font-weight: 400;
            letter-spacing: 3px;
            background: rgba(255,255,255,0.12);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .loading-placeholder, .error-placeholder {
            padding: 0.8rem 0;
            font-weight: 300;
            opacity: 0.8;
        }

        /* 响应式 */
        @media (max-width: 1000px) {
            .link-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 700px) {
            .glass-panel { padding: 2rem 1.8rem; }
            h1 { font-size: 2.2rem; }
            .link-grid { grid-template-columns: repeat(3, 1fr); }
            .weather-row { flex-direction: column; }
        }
        @media (max-width: 500px) {
            .link-grid { grid-template-columns: repeat(2, 1fr); }
            .temp-value { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="container">
    <div class="glass-panel">
        <h1>
            <i class="fas fa-wand-magic-sparkles"></i> 
            Z1奇妙小工具
        </h1>

        <!-- 天气模块 -->
        <div class="weather-section">
            <h2><i class="fas fa-location-dot" style="margin-right: 10px;"></i>今日天气</h2>
            <div class="search-wrapper">
                <input type="text" id="cityInput" placeholder="输入城市拼音 (如 Shanghai)" value="Shanghai">
                <button id="searchBtn"><i class="fas fa-magnifying-glass"></i> 查询</button>
            </div>
            <div id="weatherWidget">
                <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> 正在获取天气…</div>
            </div>
        </div>

        <!-- 下载区域：节点加速器 -->
        <div class="download-section">
            <div class="download-btn-wrapper">
                <a href="./Zip/123.zip" download class="download-btn">
                    <i class="fas fa-cloud-arrow-down"></i>
                    点击下载
                    <i class="fas fa-bolt"></i>
                </a>
                <div class="download-subtitle">⚡ 节点加速器</div>
            </div>
        </div>

        <!-- 软件链接区域 -->
        <div class="software-section">
            <h2><i class="fas fa-compass"></i> 常用软件 · 官网直达</h2>
            <div class="link-grid">
                <!-- 软件列表保持不变 -->
                <a href="https://www.google.com/chrome/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-chrome"></i><span>Chrome</span>
                </a>
                <a href="https://github.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-github"></i><span>GitHub</span>
                </a>
                <a href="https://www.python.org/downloads/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-python"></i><span>Python</span>
                </a>
                <a href="https://obsidian.md/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fas fa-brain"></i><span>Obsidian</span>
                </a>
                <a href="https://sunlogin.oray.com/download/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fas fa-desktop"></i><span>向日葵</span>
                </a>
                <a href="https://www.tbtool.cn/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fas fa-toolbox"></i><span>图吧工具箱</span>
                </a>
                <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-instagram"></i><span>Instagram</span>
                </a>
                <a href="https://x.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-x-twitter"></i><span>X</span>
                </a>
                <a href="https://discord.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-discord"></i><span>Discord</span>
                </a>
                <a href="https://www.tiktok.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-tiktok"></i><span>TikTok</span>
                </a>
                <a href="https://telegram.org/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-telegram"></i><span>Telegram</span>
                </a>
                <a href="https://www.spotify.com/" target="_blank" rel="noopener" class="soft-link">
                    <i class="fab fa-spotify"></i><span>Spotify</span>
                </a>
            </div>
            <div class="footer-meta">
                <span class="zyk-badge">ZYK</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 天气模块 ----------
        const DEFAULT_CITY = 'Shanghai';
        const WEATHER_API_GEO = 'https://geocoding-api.open-meteo.com/v1/search';
        const WEATHER_API_FORECAST = 'https://api.open-meteo.com/v1/forecast';

        const widget = document.getElementById('weatherWidget');
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');

        const weatherIconMap = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌦️', 53: '🌦️', 55: '🌧️', 61: '🌧️', 63: '🌧️', 65: '🌧️',
            71: '🌨️', 73: '🌨️', 75: '❄️', 80: '🌦️', 81: '🌦️', 82: '🌧️',
            95: '⛈️', 96: '⛈️', 99: '⛈️'
        };

        function getFunMessageAndMood(temp) {
            let msg, moodEmoji, moodDesc;
            if (temp <= 0) {
                msg = "🥶 冷到裂开，裹紧小被子";
                moodEmoji = "❄️🧊";
                moodDesc = "极寒模式";
            } else if (temp <= 10) {
                msg = "🧣 有点凉，围巾安排上";
                moodEmoji = "🌬️🧥";
                moodDesc = "微冷";
            } else if (temp <= 20) {
                msg = "🍃 温度舒服，适合散步";
                moodEmoji = "🌸🚶";
                moodDesc = "惬意春日";
            } else if (temp <= 28) {
                msg = "☕ 冰美式时间，效率翻倍";
                moodEmoji = "☕💻";
                moodDesc = "高效时刻";
            } else if (temp <= 35) {
                msg = "🍉 空调西瓜续命";
                moodEmoji = "🍉☀️";
                moodDesc = "夏日炎炎";
            } else {
                msg = "🔥 热化了，注意防暑";
                moodEmoji = "🔥🧊";
                moodDesc = "酷热难耐";
            }
            return { msg, moodEmoji, moodDesc };
        }

        function renderWeather(data, cityName) {
            const temp = Math.round(data.current_weather.temperature);
            const windSpeed = data.current_weather.windspeed;
            const weatherCode = data.current_weather.weathercode;
            const icon = weatherIconMap[weatherCode] || '🌈';
            const descMap = {0:'晴朗',1:'晴间多云',2:'局部多云',3:'阴',45:'雾',51:'毛毛雨',61:'小雨',80:'阵雨'};
            const desc = descMap[weatherCode] || '多云';
            
            const { msg, moodEmoji, moodDesc } = getFunMessageAndMood(temp);
            
            const html = `
                <div class="weather-row">
                    <div class="weather-left">
                        <div class="weather-main">
                            <div class="temp-area">
                                <span class="temp-value">${temp}</span>
                                <span class="temp-unit">°C</span>
                            </div>
                            <div class="city-status">
                                <span class="weather-icon">${icon}</span>
                                <span>${cityName}</span>
                            </div>
                        </div>
                        <div class="weather-desc">${desc}</div>
                        <div class="detail-grid">
                            <div class="detail-chip"><i class="fas fa-wind"></i> 风速 ${windSpeed} km/h</div>
                            <div class="detail-chip"><i class="fas fa-droplet"></i> 湿度 ${data.current_weather.relative_humidity || '--'}%</div>
                            <div class="detail-chip"><i class="fas fa-eye"></i> 能见度 ${data.current_weather.visibility ? (data.current_weather.visibility/1000).toFixed(1)+'km' : '--'}</div>
                        </div>
                        <div class="fun-message"><i class="fas fa-message"></i> ${msg}</div>
                    </div>
                    <div class="weather-right">
                        <div class="info-card">
                            <div class="clock-section">
                                <div class="clock-time" id="liveClockTime">--:--:--</div>
                                <div class="clock-date" id="liveClockDate">----.--.--</div>
                            </div>
                            <div class="mood-section">
                                <div class="mood-emoji">${moodEmoji}</div>
                                <div class="mood-desc">${moodDesc}</div>
                                <div class="mood-temp-tip">体感温度 ${temp}°C</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            widget.innerHTML = html;
            updateClock();
        }

        function renderError(msg) {
            widget.innerHTML = `<div class="error-placeholder"><i class="fas fa-triangle-exclamation"></i> ${msg}</div>`;
        }

        function renderLoading() {
            widget.innerHTML = `<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> 正在获取天气…</div>`;
        }

        async function fetchWeather(city) {
            renderLoading();
            try {
                const geoRes = await fetch(`${WEATHER_API_GEO}?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                if (!geoRes.ok) throw new Error('定位失败');
                const geoData = await geoRes.json();
                if (!geoData.results || geoData.results.length === 0) throw new Error(`找不到 "${city}"，试试拼音`);
                const { latitude, longitude, name, country } = geoData.results[0];
                
                const weatherRes = await fetch(`${WEATHER_API_FORECAST}?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=relativehumidity_2m,visibility&timezone=auto&forecast_days=1`);
                if (!weatherRes.ok) throw new Error('天气获取失败');
                const weatherData = await weatherRes.json();
                
                if (weatherData.hourly) {
                    const humidity = weatherData.hourly.relativehumidity_2m;
                    const visibility = weatherData.hourly.visibility;
                    if (humidity?.length) weatherData.current_weather.relative_humidity = humidity[0];
                    if (visibility?.length) weatherData.current_weather.visibility = visibility[0];
                }
                
                renderWeather(weatherData, name + (country ? `, ${country}` : ''));
            } catch (error) {
                console.error(error);
                renderError(error.message || '天气信息获取失败');
            }
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (!city) renderError('请输入城市名');
            else fetchWeather(city);
        });
        cityInput.addEventListener('keypress', (e) => { if(e.key==='Enter') searchBtn.click(); });

        fetchWeather(DEFAULT_CITY);

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateStr = now.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'.');
            const timeEl = document.getElementById('liveClockTime');
            const dateEl = document.getElementById('liveClockDate');
            if (timeEl) timeEl.textContent = timeStr;
            if (dateEl) dateEl.textContent = dateStr;
        }
        setInterval(updateClock, 1000);

        // ---------- 粒子系统 ----------
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 100;
        const REPEL_RADIUS = 110;
        const REPEL_FORCE = 0.12;
        const MAX_SPEED = 0.9;
        const CONNECT_DIST = 120;

        let mouseX = -1000, mouseY = -1000, mouseInside = false;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2.8 + 1.2,
                });
            }
        }

        function updateParticles() {
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 5 || p.x > width - 5) { p.vx *= -0.9; p.x = Math.min(Math.max(p.x, 5), width-5); }
                if (p.y < 5 || p.y > height - 5) { p.vy *= -0.9; p.y = Math.min(Math.max(p.y, 5), height-5); }
                const sp = Math.hypot(p.vx, p.vy);
                if (sp > MAX_SPEED) { p.vx *= MAX_SPEED/sp; p.vy *= MAX_SPEED/sp; }

                if (mouseInside) {
                    const dx = p.x - mouseX, dy = p.y - mouseY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < REPEL_RADIUS) {
                        const angle = Math.atan2(dy, dx);
                        const force = (REPEL_RADIUS - dist) / REPEL_RADIUS * REPEL_FORCE;
                        p.vx += Math.cos(angle) * force;
                        p.vy += Math.sin(angle) * force;
                    }
                }
                if (Math.random() < 0.02) {
                    p.vx += (Math.random()-0.5)*0.06;
                    p.vy += (Math.random()-0.5)*0.06;
                }
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(220, 240, 255, 0.2)';
            ctx.lineWidth = 0.6;
            for (let i=0; i<particles.length; i++) {
                for (let j=i+1; j<particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < CONNECT_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
            ctx.shadowBlur = 8;
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, 2*Math.PI);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; mouseInside = true; });
        window.addEventListener('mouseleave', () => { mouseInside = false; });
        resizeCanvas();
        animate();
    })();
</script>
</body>
</html>
